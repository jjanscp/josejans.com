[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  force = false

# Legacy WordPress Spanish URLs → new structure
[[redirects]]
  from = "/inicio/"
  to = "/es/"
  status = 301

[[redirects]]
  from = "/contacto/"
  to = "/es/contact/"
  status = 301

[[redirects]]
  from = "/blog/"
  to = "/es/blog/"
  status = 301

[[redirects]]
  from = "/trabajos/"
  to = "/es/publications/"
  status = 301

[[redirects]]
  from = "/trabajos/publicaciones/"
  to = "/es/publications/"
  status = 301

[[redirects]]
  from = "/trabajos/bases-de-datos/"
  to = "/es/archive/"
  status = 301

[[redirects]]
  from = "/trabajos/bases-de-datos/base-de-datos-intervenciones-ciudadanas/"
  to = "/es/archive/citizen-interventions-dataset/"
  status = 301

[[redirects]]
  from = "/trabajos/bases-de-datos/base-de-datos-notas-de-prensa-implementacion-del-acuerdo-final-de-paz/"
  to = "/es/archive/peace-agreement-press-dataset/"
  status = 301

[[redirects]]
  from = "/base-de-datos-notas-de-prensa-implementacion-del-acuerdo-final-de-paz/"
  to = "/es/archive/peace-agreement-press-dataset/"
  status = 301

[[redirects]]
  from = "/2018/09/17/primera-entrada-del-blog/"
  to = "/es/blog/primera-entrada-del-blog/"
  status = 301

# Security & headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
